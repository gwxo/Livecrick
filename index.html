<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GW Team | Prime Live Streams</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&display=swap');

        :root {
            --bg-base: #020617; /* Extreme Dark Blue/Black */
            --glass-bg: rgba(15, 23, 42, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            
            --accent-cyan: #00f2fe;
            --accent-blue: #3b82f6;
            
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            
            --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 1. Animated Checkered Grid Background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: 45px 45px;
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            z-index: -2;
            -webkit-mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
            mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
            animation: panGrid 60s linear infinite;
        }

        @keyframes panGrid {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(45px) translateX(45px); }
        }

        /* Ambient Glowing Orbs */
        .ambient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(140px);
            z-index: -1;
            opacity: 0.4;
            animation: floatOrb 12s infinite alternate ease-in-out;
        }
        .orb-1 { width: 500px; height: 500px; background: rgba(0, 242, 254, 0.2); top: -10%; left: -10%; }
        .orb-2 { width: 600px; height: 600px; background: rgba(59, 130, 246, 0.15); bottom: -20%; right: -10%; animation-delay: -6s; }

        @keyframes floatOrb {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(80px) scale(1.1); }
        }

        /* Glassmorphism Utility */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            border-bottom: 1px solid rgba(0, 242, 254, 0.15);
            background: rgba(2, 6, 23, 0.7);
            backdrop-filter: blur(15px);
            animation: slideDown 0.6s ease-out;
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo svg { width: 28px; height: 28px; fill: var(--accent-cyan); filter: drop-shadow(0 0 8px var(--accent-cyan)); }
        .logo span {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            padding: 10px 22px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        nav a svg { width: 16px; height: 16px; fill: currentColor; }
        
        nav a:hover {
            background: rgba(0, 242, 254, 0.1);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
            transform: translateY(-2px);
        }

        /* Layout Container */
        .container {
            display: grid;
            grid-template-columns: 2.5fr 1fr;
            gap: 30px;
            padding: 30px 5%;
            max-width: 1600px;
            margin: 0 auto;
            flex-grow: 1;
            width: 100%;
            animation: fadeIn 1s ease-out;
        }

        /* Left: Player Section */
        .player-section { display: flex; flex-direction: column; gap: 20px; }

        .player-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(0, 242, 254, 0.2);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.6), 0 0 20px rgba(0, 242, 254, 0.1);
        }

        .player-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        .stream-info {
            padding: 20px 25px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            overflow: hidden;
        }

        .stream-info::before {
            content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 5px;
            background: linear-gradient(to bottom, var(--accent-cyan), var(--accent-blue));
            box-shadow: 0 0 15px var(--accent-cyan);
        }

        .live-indicator {
            display: flex; align-items: center; gap: 8px;
            background: rgba(239, 68, 68, 0.1);
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .pulse-dot {
            width: 8px; height: 8px; background: #ef4444; border-radius: 50%;
            box-shadow: 0 0 10px #ef4444; animation: pulseRed 1.5s infinite;
        }

        @keyframes pulseRed {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .live-text { color: #ef4444; font-size: 13px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; }
        .stream-info h2 { font-size: 22px; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        /* Right: Channels Section */
        .channels-wrapper {
            display: flex; flex-direction: column; gap: 20px;
            height: calc(100vh - 140px);
            position: sticky; top: 100px;
        }

        /* 2. Notification Box */
        .notification-bar {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 15px; border-radius: 12px;
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.05), rgba(59, 130, 246, 0.05));
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-left: 4px solid var(--accent-cyan);
            animation: pulseBorder 3s infinite alternate;
        }
        
        @keyframes pulseBorder {
            0% { border-color: rgba(0, 242, 254, 0.2); box-shadow: 0 0 0 rgba(0, 242, 254, 0); }
            100% { border-color: rgba(0, 242, 254, 0.5); box-shadow: 0 0 15px rgba(0, 242, 254, 0.1); }
        }

        .notification-bar svg { width: 20px; height: 20px; fill: var(--accent-cyan); margin-top: 2px; flex-shrink: 0; filter: drop-shadow(0 0 5px var(--accent-cyan)); }
        .notification-bar p { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
        .notification-bar strong { color: var(--text-main); font-weight: 600; }

        .channels-section {
            border-radius: 16px; padding: 20px 15px 20px 20px;
            display: flex; flex-direction: column; flex-grow: 1; overflow: hidden;
        }

        .channels-section h3 {
            margin-bottom: 20px; font-size: 16px; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 2px;
            display: flex; align-items: center; gap: 10px;
            padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .channels-section h3 svg { width: 18px; height: 18px; fill: var(--text-dim); }

        .channel-list {
            overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-right: 10px;
        }

        .channel-list::-webkit-scrollbar { width: 4px; }
        .channel-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .channel-list::-webkit-scrollbar-thumb { background: rgba(0, 242, 254, 0.3); border-radius: 10px; }
        .channel-list::-webkit-scrollbar-thumb:hover { background: var(--accent-cyan); }

        /* Channel Buttons */
        .channel-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 16px; border-radius: 12px; color: var(--text-dim);
            font-size: 15px; font-weight: 500; text-align: left;
            cursor: pointer; transition: var(--transition);
            display: flex; align-items: center; gap: 14px;
            opacity: 0; transform: translateY(15px);
            animation: fadeUp 0.5s forwards;
            position: relative; overflow: hidden;
        }

        .channel-btn::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        .play-icon { width: 14px; height: 14px; fill: currentColor; opacity: 0.4; transition: var(--transition); }

        .channel-btn:hover {
            background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.1);
            color: var(--text-main); transform: translateX(5px);
        }
        .channel-btn:hover::after { left: 100%; }
        .channel-btn:hover .play-icon { fill: var(--accent-cyan); opacity: 1; }

        .channel-btn.active {
            background: linear-gradient(90deg, rgba(0, 242, 254, 0.1), transparent);
            border-color: var(--accent-cyan); color: var(--text-main);
            box-shadow: inset 2px 0 0 var(--accent-cyan), 0 0 20px rgba(0, 242, 254, 0.05);
        }
        .channel-btn.active .play-icon {
            fill: var(--accent-cyan); opacity: 1; filter: drop-shadow(0 0 6px var(--accent-cyan));
        }

        /* Footer */
        footer {
            margin-top: auto; padding: 25px; text-align: center;
            border-top: 1px solid var(--glass-border);
            font-size: 14px; color: var(--text-dim);
            background: rgba(2, 6, 23, 0.5); backdrop-filter: blur(10px);
        }
        footer span {
            color: var(--accent-cyan); font-weight: 800; letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        /* Keyframes for layout */
        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Mobile Adjustments */
        @media (max-width: 1024px) {
            .container { grid-template-columns: 1fr; padding: 20px 5%; }
            .player-section { position: sticky; top: 75px; z-index: 90; padding-bottom: 15px; background: var(--bg-base); }
            .player-wrapper { box-shadow: 0 15px 35px rgba(0,0,0,0.9); border-radius: 12px; }
            .channels-wrapper { height: auto; position: relative; top: 0; gap: 15px; }
            .channel-list { max-height: 500px; }
        }
    </style>
</head>
<body>

    <!-- Background Layers -->
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <!-- Header -->
    <header>
        <div class="logo">
            <!-- Lightning SVG -->
            <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            GW <span>TEAM</span>
        </div>
        <nav>
            <a href="https://thehixvy.pages.dev" target="_blank">
                <!-- User SVG -->
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                About Me
            </a>
        </nav>
    </header>

    <!-- Main Content -->
    <div class="container">
        
        <!-- Left: Video Player -->
        <div class="player-section">
            <div class="player-wrapper glass">
                <iframe id="video-player" src="" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
            </div>
            
            <div class="stream-info glass">
                <div class="live-indicator">
                    <div class="pulse-dot"></div>
                    <span class="live-text">LIVE</span>
                </div>
                <h2 id="current-channel-name">Initializing Stream...</h2>
            </div>
        </div>

        <!-- Right: Notification + Channel List -->
        <div class="channels-wrapper">
            
            <!-- Notification Box -->
            <div class="notification-bar glass">
                <!-- Info SVG -->
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                <p><strong>Note:</strong> If a stream is unresponsive or buffers, please try an alternative server from the list below.</p>
            </div>

            <!-- List Box -->
            <div class="channels-section glass">
                <h3>
                    <!-- TV/List SVG -->
                    <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
                    Server Selection
                </h3>
                <div class="channel-list" id="channel-container">
                    <!-- Channels Injected via JS -->
                </div>
            </div>

        </div>

    </div>

    <!-- Eye Catching Footer -->
    <footer>
        <p>&copy; 2025 <span>GW TEAM</span> | Designed for an uninterrupted cinematic experience.</p>
    </footer>

    <script>
        // Array manually ordered based on priority requested:
        const channels = [
            { name: "Gw Stream Eng", src: "https://hux.codewithprashant07.workers.dev/" },
            { name: "Star Sports Hindi", src: "https://allrounder-live4.pages.dev/star/star-1-hindi" },
            { name: "Star Sports Telugu", src: "https://allrounder-live4.pages.dev/star/telugu" },
            { name: "Star Sports Tamil", src: "https://allrounder-live4.pages.dev/star/tamil-1" },
            
            // Rest of the channels
            { name: "Cricbuzz", src: "https://allrounder-live4.pages.dev/channel/cricbuzz" },
            { name: "Star Sports Hindi (PTV)", src: "https://allrounder-live2.pages.dev/channel/ptv" },
            { name: "Myco", src: "https://allrounder-rho.vercel.app/channel/myco.html" },
            { name: "Prime Hindi", src: "https://allrounder-live.pages.dev/channel/prame-hin.html" },
            { name: "Hotstar (WPL)", src: "https://allrounderlive.pages.dev/cric-life" },
            { name: "Hub", src: "https://allrounder-live.pages.dev/channel/hub5" },
            { name: "TNT Sports", src: "https://allrounder-live2.pages.dev/channel/tnt-2" },
            { name: "Asia Cup", src: "https://allrounderlive.pages.dev/player?url=https://d3ssd0juqbxbw.cloudfront.net/mtvsinstlive/master.m3u8" },
            { name: "Willow", src: "https://allrounder-live4.pages.dev/channel/willow" },
            { name: "Willow 2", src: "https://allrounderlive.pages.dev/willow2" },
            { name: "Prime Hindi (Alt)", src: "https://allrounder-live.pages.dev/channel/prame-hin.html" },
            { name: "DILLZY", src: "https://allrounderlive.pages.dev/player?url=https://dillzy.cricketstream745.workers.dev/live.m3u8" },
            { name: "Prime English", src: "https://allrounder-live4.pages.dev/channel/prame.html" },
            { name: "Sky NZ", src: "https://allrounder-live4.pages.dev/channel/prime.html" },
            { name: "Willow Sports", src: "https://cricketstan.github.io/Willow-Sports/" },
            { name: "Hotstar (Alt)", src: "https://allrounderlive.pages.dev/dilz?id=dillzy645" },
            { name: "Fox Cricket 501", src: "https://allrounder-live2.pages.dev/channel/fox" },
            { name: "7 Plus Cricket", src: "https://allrounderlive.pages.dev/player?url=https://hugh.cdn.rumble.cloud/live/gi29le7p/slot-139/bx1o-9vac_720p/chunklist.m3u8" },
            { name: "Apple Wale", src: "https://allrounderlive.pages.dev/player4?url=https://amg01269-amg01269c1-sportstribal-emea-5204.playouts.now.amagi.tv/playlist/amg01269-willowtvfast-willowplus-sportstribalemea/playlist.m3u8" },
            { name: "Fox Cricket HD", src: "https://cricketstan.github.io/Fox-Cricket-/" },
            { name: "Zee Cinema", src: "https://zee-seven.vercel.app/" },
            { name: "Jio Hotstar", src: "https://allrounder-live4.pages.dev/channel/hotstar" },
            { name: "SKY UK", src: "https://allroundersd.pages.dev/channel/sky-uk" },
            { name: "SKY NZ 1", src: "https://crickettv.site/sky-nz/player?id=3" },
            { name: "TNT Sports 1", src: "https://cricketstan.github.io/TNT-1/" },
            { name: "PRIME NZ", src: "https://hff-cricketstan.wasmer.app/" },
            { name: "SONY", src: "https://allrounderlive.pages.dev/sonyliv/sonyliv-1" },
            { name: "SONY 3", src: "https://cricketstan.github.io/Sony-ten-5/" },
            { name: "Cricbuzz (SD)", src: "https://allroundersd.pages.dev/cricbuzz1.html" },
            { name: "Fancode", src: "https://allrounder-live4.pages.dev/fancode-player?url=https://in-mc-flive.fancode.com/mumbai/141407_english_hls_ab5ff6c24a21542_1ta-di_h264/1080p.m3u8" }
        ];

        const container = document.getElementById('channel-container');
        const player = document.getElementById('video-player');
        const titleLabel = document.getElementById('current-channel-name');

        // Play icon SVG
        const playSVG = `<svg class="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;

        function playStream(name, src, btnElement) {
            if(!src) return; 

            player.src = src;
            titleLabel.textContent = name;

            // Manage Active States
            document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');

            // Scroll up to player on Mobile
            if (window.innerWidth <= 1024) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function init() {
            channels.forEach((ch, index) => {
                const btn = document.createElement('button');
                btn.className = 'channel-btn';
                
                // Staggered Entrance Animation
                btn.style.animationDelay = `${index * 0.04}s`;
                
                // Inner HTML (SVG + Text)
                btn.innerHTML = `${playSVG} <span>${ch.name}</span>`;
                
                btn.onclick = () => playStream(ch.name, ch.src, btn);
                container.appendChild(btn);

                // Auto-play the 1st priority channel
                if(index === 0) {
                    setTimeout(() => playStream(ch.name, ch.src, btn), 100);
                }
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
