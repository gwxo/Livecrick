<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GW TEAM — Live Stream</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: #050505;
    --surface-glass: rgba(20, 20, 25, 0.6);
    --surface-solid: #15161c;
    --accent-1: #3b82f6; /* Blue */
    --accent-2: #8b5cf6; /* Purple */
    --border-color: rgba(255, 255, 255, 0.08);
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --red: #f43f5e;
  }

  *, *::before, *::after { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
  }

  body {
    font-family: 'Outfit', sans-serif;
    background-color: var(--bg-color);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 60px;
    overflow-x: hidden;
  }

  /* ─── ANIMATED BACKGROUND ─── */
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(circle at 50% 50%, rgba(59,130,246,0.15), transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(139,92,246,0.15), transparent 40%);
    z-index: 0;
    pointer-events: none;
    animation: drift 20s infinite alternate linear;
  }
  @keyframes drift {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(15deg); }
  }

  /* ─── NAVBAR ─── */
  .navbar {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 600px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 20px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 3px;
    background: linear-gradient(135deg, #fff, var(--accent-1));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    position: relative;
  }
  .logo::after {
    content: 'LIVE';
    position: absolute;
    top: -2px;
    right: -38px;
    font-family: 'Outfit', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    background: var(--red);
    -webkit-text-fill-color: #fff;
    padding: 3px 6px;
    border-radius: 6px;
    animation: pulse-badge 2s infinite;
  }

  @keyframes pulse-badge {
    0%, 100% { opacity: 1; box-shadow: 0 0 0px var(--red); }
    50% { opacity: 0.6; box-shadow: 0 0 10px var(--red); }
  }

  /* ─── MAIN CONTAINER ─── */
  .container {
    position: relative;
    z-index: 5;
    width: 100%;
    max-width: 600px;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ─── PLAYER AREA ─── */
  .player-box {
    position: relative;
    width: 100%;
    background: #000;
    border-radius: 20px;
    padding-top: 56.25%; /* 16:9 Aspect Ratio */
    box-shadow: 0 0 0 1px var(--border-color), 0 20px 50px rgba(0,0,0,0.8);
    overflow: hidden;
  }

  /* Neon Glow effect behind player */
  .player-box::before {
    content: '';
    position: absolute;
    inset: -2px;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    z-index: -1;
    filter: blur(15px);
    opacity: 0.35;
  }

  .player-box iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
    border-radius: 18px;
    z-index: 5;
  }

  .player-badge {
    position: absolute;
    top: 15px; left: 15px;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 6px 12px;
    border-radius: 30px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: #fff;
  }
  .player-badge .dot {
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
    animation: pulse-badge 1.5s infinite;
  }

  /* ─── INFO BANNER (Explains offline streams) ─── */
  .info-banner {
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid rgba(245, 158, 11, 0.2);
    color: #fbbf24;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 400;
    line-height: 1.5;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .info-banner svg { width: 18px; height: 18px; fill: #fbbf24; flex-shrink: 0; margin-top: 2px;}

  /* ─── GLASS CARDS ─── */
  .card {
    background: var(--surface-glass);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border-color);
    border-radius: 20px;
    padding: 20px;
  }

  .card-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  /* ─── DROPDOWN SELECTOR ─── */
  .select-wrapper {
    position: relative;
  }
  .custom-select {
    width: 100%;
    appearance: none;
    background: var(--surface-solid);
    color: #fff;
    border: 1px solid var(--border-color);
    padding: 16px 20px;
    border-radius: 14px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .custom-select:hover, .custom-select:focus {
    border-color: var(--accent-1);
    box-shadow: 0 0 20px rgba(59,130,246,0.15);
    outline: none;
  }
  .custom-select option {
    background: #111;
    color: #fff;
    padding: 10px;
  }
  .select-icon {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    width: 16px; height: 16px;
    fill: var(--accent-1);
  }

  /* ─── BUTTONS ─── */
  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    color: #fff;
    border: none;
    padding: 16px;
    border-radius: 14px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.3s ease;
    box-shadow: 0 10px 25px rgba(59,130,246,0.25);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 35px rgba(59,130,246,0.4);
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;}

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translate(-50%, 20px);
    background: #064e3b;
    border: 1px solid #10b981;
    color: #a7f3d0;
    padding: 12px 24px;
    border-radius: 30px;
    font-weight: 500;
    font-size: 14px;
    z-index: 100;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .toast.show {
    opacity: 1;
    visibility: visible;
    transform: translate(-50%, 0);
  }

  .footer {
    text-align: center;
    margin-top: 30px;
    font-size: 13px;
    color: var(--text-muted);
    z-index: 5;
    position: relative;
  }

</style>
</head>
<body>

<div class="toast" id="toast">✓ Stream link copied to clipboard!</div>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">GW TEAM</div>
  <div class="nav-dot"></div>
</nav>

<!-- MAIN CONTENT -->
<div class="container">

  <!-- VIDEO PLAYER -->
  <div class="player-box">
    <div class="player-badge">
      <div class="dot"></div> <span id="currentChannelName">Loading...</span>
    </div>
    <div id="player-container"></div>
  </div>

  <!-- SERVER INFO NOTICE -->
  <div class="info-banner">
    <svg viewBox="0 0 24 24"><path d="M12 2L1 21h22L12 2zm0 4l7.5 13h-15L12 6zm-1 4v5h2v-5h-2zm0 7v2h2v-2h-2z"/></svg>
    <span><b>Note:</b> If a stream (like Hindi) shows an error or doesn't load, the host server is currently offline. Please switch to another channel from the list below.</span>
  </div>

  <!-- CHANNEL SELECTOR -->
  <div class="card">
    <div class="card-title">Switch Channel</div>
    <div class="select-wrapper">
      <select id="channelSelect" class="custom-select"></select>
      <svg class="select-icon" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
    </div>
  </div>

  <!-- SHARE -->
  <div class="card">
    <div class="card-title">Share Direct Link</div>
    <button class="btn-primary" id="shareBtn">
      <svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
      Copy Channel Link
    </button>
  </div>

  <div class="footer">© 2025 GW TEAM · Built for Seamless Streaming</div>

</div>

<script>
// ─── JSON DATA ───
const streamData = {
  "iframes": [
    { "id": "eng", "name": "Star Sports Select (Default)", "iframeSrc": "https://allrounder-live4.pages.dev/star/star-1" },
    { "id": "hindi", "name": "Star Sports Hindi", "iframeSrc": "https://allrounder-live4.pages.dev/star/star-1-hindi" },
    { "id": "cricbuzz", "name": "Cricbuzz", "iframeSrc": "https://allrounder-live4.pages.dev/channel/cricbuzz" },
    { "id": "wpl", "name": "Hotstar WPL", "iframeSrc": "https://allrounderlive.pages.dev/cric-life" },
    { "id": "asiacup", "name": "Asia Cup", "iframeSrc": "https://allrounderlive.pages.dev/player?url=https://d3ssd0juqbxbw.cloudfront.net/mtvsinstlive/master.m3u8" },
    { "id": "willow", "name": "Willow TV", "iframeSrc": "https://allrounder-live4.pages.dev/channel/willow" },
    { "id": "willow-2", "name": "Willow TV 2", "iframeSrc": "https://allrounderlive.pages.dev/willow2" },
    { "id": "willow-sports", "name": "Willow Sports", "iframeSrc": "https://cricketstan.github.io/Willow-Sports/" },
    { "id": "alt", "name": "GW TEAM (Alt Stream)", "iframeSrc": "https://allrounderlive.pages.dev/player?url=https://dillzy.cricketstream745.workers.dev/live.m3u8" },
    { "id": "fox", "name": "Fox Cricket 501", "iframeSrc": "https://allrounder-live2.pages.dev/channel/fox" },
    { "id": "fox-hd", "name": "Fox Cricket HD", "iframeSrc": "https://cricketstan.github.io/Fox-Cricket-/" },
    { "id": "channel-7", "name": "7 Plus Cricket", "iframeSrc": "https://allrounderlive.pages.dev/player?url=https://hugh.cdn.rumble.cloud/live/gi29le7p/slot-139/bx1o-9vac_720p/chunklist.m3u8" },
    { "id": "ios", "name": "Apple Wale / iOS", "iframeSrc": "https://allrounderlive.pages.dev/player4?url=https://amg01269-amg01269c1-sportstribal-emea-5204.playouts.now.amagi.tv/playlist/amg01269-willowtvfast-willowplus-sportstribalemea/playlist.m3u8" },
    { "id": "sky-uk", "name": "SKY UK", "iframeSrc": "https://allroundersd.pages.dev/channel/sky-uk" },
    { "id": "sky-nz-1", "name": "SKY NZ 1", "iframeSrc": "https://crickettv.site/sky-nz/player?id=3" },
    { "id": "sky-sports-nz", "name": "Sky NZ", "iframeSrc": "https://allrounder-live4.pages.dev/channel/prime.html" },
    { "id": "prime-hin", "name": "Prime Hindi", "iframeSrc": "https://allrounder-live.pages.dev/channel/prame-hin.html" },
    { "id": "prime-eng", "name": "Prime English", "iframeSrc": "https://allrounder-live4.pages.dev/channel/prame.html" },
    { "id": "prime-nz", "name": "PRIME NZ", "iframeSrc": "https://hff-cricketstan.wasmer.app/" },
    { "id": "tnt", "name": "TNT Sports", "iframeSrc": "https://allrounder-live2.pages.dev/channel/tnt-2" },
    { "id": "tnt-1", "name": "TNT Sports 1", "iframeSrc": "https://cricketstan.github.io/TNT-1/" },
    { "id": "sony", "name": "SONY Liv", "iframeSrc": "https://allrounderlive.pages.dev/sonyliv/sonyliv-1" },
    { "id": "sony-3", "name": "Sony Ten 5", "iframeSrc": "https://cricketstan.github.io/Sony-ten-5/" },
    { "id": "zee", "name": "Zee Cinema", "iframeSrc": "https://zee-seven.vercel.app/" },
    { "id": "hotstar", "name": "Hotstar (Main)", "iframeSrc": "https://allrounderlive.pages.dev/dilz?id=dillzy645" },
    { "id": "jio-hotstar", "name": "Jio Hotstar", "iframeSrc": "https://allrounder-live4.pages.dev/channel/hotstar" },
    { "id": "fancode", "name": "Fancode", "iframeSrc": "https://allrounder-live4.pages.dev/fancode-player?url=https://in-mc-flive.fancode.com/mumbai/141407_english_hls_ab5ff6c24a21542_1ta-di_h264/1080p.m3u8?hdntl=Expires=1773474245~_GO=Generated~acl=/mumbai/141407_english_hls_ab5ff6c24a21542_1ta-di_h264/*~Signature=AR77L-Yyr9Cdj5X_0so3HpmxTUDWXrASgqUxhTGBOrJaU6SPgB5oUrj5FOVZ7FqeaDZnyCZIHYhGDYKbrr-wcsI214oJ" },
    { "id": "ptv", "name": "PTV Sports", "iframeSrc": "https://allrounder-live2.pages.dev/channel/ptv" },
    { "id": "myco", "name": "Myco", "iframeSrc": "https://allrounder-rho.vercel.app/channel/myco.html" },
    { "id": "hub", "name": "Hub", "iframeSrc": "https://allrounder-live.pages.dev/channel/hub5" },
    { "id": "telugu", "name": "Star Telugu", "iframeSrc": "https://allrounder-live4.pages.dev/star/telugu" },
    { "id": "tamil", "name": "Star Tamil", "iframeSrc": "https://allrounder-live4.pages.dev/star/tamil-1" }
  ]
};

document.addEventListener("DOMContentLoaded", function () {
  const select = document.getElementById("channelSelect");
  const playerContainer = document.getElementById("player-container");
  const channelNameLabel = document.getElementById("currentChannelName");
  
  // Read URL parameters
  const urlParams = new URLSearchParams(window.location.search);
  let currentId = urlParams.get("id");

  // Populate Dropdown Menu
  streamData.iframes.forEach(item => {
    let option = document.createElement("option");
    option.value = item.id;
    option.text = item.name;
    select.appendChild(option);
  });

  // Load Iframe Function
  function loadStream(id) {
    const match = streamData.iframes.find(item => item.id === id);
    if (match && match.iframeSrc) {
      playerContainer.innerHTML = `<iframe src="${match.iframeSrc}" allow="encrypted-media; autoplay" allowfullscreen></iframe>`;
      channelNameLabel.innerText = match.name;
      
      // Update URL silently so copying the link shares the correct channel
      window.history.replaceState(null, null, "?id=" + id);
      select.value = id;
    }
  }

  // Detect Dropdown Change
  select.addEventListener("change", function(e) {
    loadStream(e.target.value);
  });

  // ─── DEFAULT LOGIC ───
  // If no ID in the link, or the ID doesn't exist, default to 'eng' (Star Sports Select)
  if (!currentId || !streamData.iframes.find(i => i.id === currentId)) {
    currentId = 'eng'; 
  }
  loadStream(currentId);

  // ─── SHARE BUTTON ───
  const toast = document.getElementById("toast");
  document.getElementById("shareBtn").onclick = function () {
    navigator.clipboard.writeText(window.location.href).then(() => {
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2500);
    });
  };

});
</script>

</body>
</html>
