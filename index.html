<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Source HLS Player with Proxy</title>
    <!-- Import open-source HLS.js library -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background-color: #121212; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: Arial, sans-serif; }
        video { width: 80%; max-width: 800px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <h2>Open Source Stream Player</h2>
    <video id="video" controls autoplay></video>

    <script>
        var video = document.getElementById('video');
        
        // Your video link
        var streamUrl = "https://tgs5.myturn1.top:8088/mobile/stream5_320p/playlist.m3u8?id=19&pk=641a646e0ad17f9baaf3f910c201e2e2790b6cd2375d5b2889966f22d4b2b3cf48da4105eb96f7f0c88d5d08320e12a69bc88410078628bb7e7bd22fa0ac0a2e";

        /* 
          VPN / PROXY ROUTING:
          If the stream is blocked in your country, you can prepend an open-source proxy URL here.
          Example using a public proxy (for testing only):
          var proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(streamUrl);
        */
        
        var finalUrl = streamUrl; // Change this to proxyUrl if you set up a proxy

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(finalUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Native support for Apple devices (Safari)
            video.src = finalUrl;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        }
    </script>

</body>
</html>
