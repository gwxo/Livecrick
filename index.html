<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gw Team | Stream Player</title>
    <!-- Import open-source HLS.js library -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* Reset margins and make the body take up the whole screen */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000; /* Black background for video */
            overflow: hidden; /* Hide scrollbars */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container to hold both video and branding */
        .player-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Video element fills the container completely */
        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Keeps aspect ratio without cropping */
            outline: none;
        }

        /* --- GW TEAM BRANDING CSS --- */
        .branding {
            position: absolute;
            top: 25px;      /* Distance from top */
            left: 30px;     /* Distance from left */
            z-index: 10;    /* Puts it above the video */
            opacity: 0.85;  /* Slight transparency */
            pointer-events: none; /* Prevents logo from blocking clicks on the video */
            
            /* Text Styling */
            color: #ffffff;
            font-size: 26px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.9), 0px 0px 10px rgba(0, 0, 0, 0.5); /* Strong shadow for visibility */
            display: flex;
            align-items: center;
        }
        
        /* Optional: Add a small colored dot or accent to the branding */
        .branding::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            background-color: #ff3b30; /* Red accent color */
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 8px #ff3b30;
        }

    </style>
</head>
<body>

    <div class="player-container">
        <!-- GW TEAM BRANDING OVERLAY -->
        <div class="branding">
            <span>Gw Team</span> 
        </div>

        <!-- VIDEO PLAYER -->
        <video id="video" controls autoplay></video>
    </div>

    <script>
        var video = document.getElementById('video');
        
        // Your video link
        var streamUrl = "https://tgs5.myturn1.top:8088/mobile/stream5_320p/playlist.m3u8?id=19&pk=641a646e0ad17f9baaf3f910c201e2e2790b6cd2375d5b2889966f22d4b2b3cf48da4105eb96f7f0c88d5d08320e12a69bc88410078628bb7e7bd22fa0ac0a2e";

        // --- FREE PROXY / "IN-BROWSER VPN" SETUP ---
        // This acts as a VPN by routing the video traffic through an external server.
        // Option 1: https://corsproxy.io/?
        // Option 2: https://api.allorigins.win/raw?url=
        var proxyUrl = "https://video-proxy.codewithprashant07.workers.dev/"; 

        if (Hls.isSupported()) {
            var hls = new Hls({
                // This intercepts every request (manifest and video chunks) and routes it through the proxy
                xhrSetup: function(xhr, url) {
                    // Prepend the proxy URL to bypass blocks and hide the user's direct connection
                    xhr.open('GET', proxyUrl + encodeURIComponent(url), true);
                }
            });
            
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
            
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Native support for Apple devices (Safari/iOS)
            // Note: Safari handles HLS natively, so we proxy the initial manifest link.
            video.src = proxyUrl + encodeURIComponent(streamUrl);
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        }

        // Double-click video to enter true device Fullscreen
        video.addEventListener('dblclick', function() {
            if (!document.fullscreenElement) {
                if (video.requestFullscreen) { video.requestFullscreen(); }
                else if (video.webkitRequestFullscreen) { video.webkitRequestFullscreen(); } // Safari
                else if (video.msRequestFullscreen) { video.msRequestFullscreen(); } // IE11
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); }
                else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
                else if (document.msExitFullscreen) { document.msExitFullscreen(); }
            }
        });
    </script>

</body>
</html>
