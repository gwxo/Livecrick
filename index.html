<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GW TEAM — Live Stream</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: #030305;
    --surface-glass: rgba(20, 20, 28, 0.45);
    --surface-solid: #12131a;
    --accent-1: #3b82f6; /* Blue */
    --accent-2: #8b5cf6; /* Purple */
    --border-color: rgba(255, 255, 255, 0.08);
    --border-hover: rgba(255, 255, 255, 0.15);
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --red: #f43f5e;
  }

  *, *::before, *::after { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
  }

  body {
    font-family: 'Outfit', sans-serif;
    background-color: var(--bg-color);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 60px;
    overflow-x: hidden;
  }

  /* ─── ANIMATED GRID & ORB BACKGROUND ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 30px 30px;
    z-index: -2;
    mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
  }

  body::after {
    content: '';
    position: fixed;
    top: -50%; left: -50%; width: 200%; height: 200%;
    background: 
      radial-gradient(circle at 40% 50%, rgba(59,130,246,0.12), transparent 30%),
      radial-gradient(circle at 60% 30%, rgba(139,92,246,0.12), transparent 30%);
    z-index: -1;
    pointer-events: none;
    animation: drift 25s infinite alternate ease-in-out;
  }

  @keyframes drift {
    0% { transform: rotate(0deg) scale(1); }
    100% { transform: rotate(15deg) scale(1.1); }
  }

  /* ─── NAVBAR ─── */
  .navbar {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 600px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 20px;
  }

  .logo-wrapper {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #fff, var(--accent-1));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    position: relative;
  }

  /* Animated SVG Equalizer */
  .equalizer {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 24px;
  }
  .equalizer rect {
    fill: var(--red);
    width: 4px;
    border-radius: 2px;
    animation: eq-bounce 1s infinite alternate ease-in-out;
  }
  .equalizer rect:nth-child(1) { height: 10px; animation-delay: 0s; }
  .equalizer rect:nth-child(2) { height: 20px; animation-delay: 0.2s; }
  .equalizer rect:nth-child(3) { height: 14px; animation-delay: 0.4s; }
  .equalizer rect:nth-child(4) { height: 8px; animation-delay: 0.6s; }

  @keyframes eq-bounce {
    0% { height: 6px; }
    100% { height: 24px; }
  }

  /* ─── MAIN CONTAINER ─── */
  .container {
    position: relative;
    z-index: 5;
    width: 100%;
    max-width: 600px;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* ─── PLAYER AREA ─── */
  .player-box {
    position: relative;
    width: 100%;
    background: #000;
    border-radius: 24px;
    padding-top: 56.25%; /* 16:9 Aspect Ratio */
    box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 20px 50px rgba(0,0,0,0.8);
    overflow: hidden;
    transform: translateZ(0); /* Hardware acceleration */
  }

  /* Breathing Neon Glow */
  .player-box::before {
    content: '';
    position: absolute;
    inset: -2px;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-1));
    background-size: 200% 200%;
    z-index: -1;
    filter: blur(20px);
    opacity: 0.4;
    animation: breathing-glow 4s infinite ease-in-out, bg-pan 6s infinite linear;
  }

  @keyframes breathing-glow {
    0%, 100% { opacity: 0.3; filter: blur(15px); }
    50% { opacity: 0.6; filter: blur(25px); }
  }
  @keyframes bg-pan {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }

  .player-box iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
    border-radius: 22px;
    z-index: 5;
    background: #0a0a0f url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 50 50"><circle cx="25" cy="25" r="20" fill="none" stroke="%233b82f6" stroke-width="4" stroke-dasharray="31.4 31.4"><animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s" repeatCount="indefinite"/></circle></svg>') no-repeat center center;
  }

  .player-badge {
    position: absolute;
    top: 15px; left: 15px;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 6px 14px;
    border-radius: 30px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: #fff;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  }
  
  .player-badge .dot {
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
    animation: pulse-dot 1.5s infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 0px var(--red); }
    50% { opacity: 0.5; box-shadow: 0 0 12px var(--red); }
  }

  /* ─── INFO BANNER ─── */
  .info-banner {
    position: relative;
    background: linear-gradient(90deg, rgba(245, 158, 11, 0.1), rgba(245, 158, 11, 0.02));
    border: 1px solid rgba(245, 158, 11, 0.2);
    border-left: 3px solid #fbbf24;
    color: #fbbf24;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 13.5px;
    font-weight: 400;
    line-height: 1.6;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    overflow: hidden;
  }

  /* Animated Warning Icon */
  .info-banner svg { 
    width: 20px; 
    height: 20px; 
    fill: none;
    stroke: #fbbf24;
    stroke-width: 2;
    flex-shrink: 0; 
    margin-top: 2px;
    animation: wiggle 3s infinite ease-in-out;
  }

  @keyframes wiggle {
    0%, 90%, 100% { transform: rotate(0deg); }
    92% { transform: rotate(-15deg); }
    96% { transform: rotate(15deg); }
    98% { transform: rotate(-10deg); }
  }

  /* ─── GLASS CARDS ─── */
  .card {
    background: var(--surface-glass);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--border-color);
    border-radius: 20px;
    padding: 24px;
    transition: transform 0.3s ease, border-color 0.3s ease;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .card:hover {
    transform: translateY(-2px);
    border-color: var(--border-hover);
  }

  .card-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ─── DROPDOWN SELECTOR ─── */
  .select-wrapper {
    position: relative;
  }
  .custom-select {
    width: 100%;
    appearance: none;
    background: rgba(0,0,0,0.3);
    color: #fff;
    border: 1px solid var(--border-color);
    padding: 18px 20px;
    border-radius: 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .custom-select:hover, .custom-select:focus {
    border-color: var(--accent-1);
    background: rgba(0,0,0,0.5);
    box-shadow: 0 0 20px rgba(59,130,246,0.15);
    outline: none;
  }
  .custom-select option {
    background: #111;
    color: #fff;
    padding: 10px;
  }
  
  .select-icon {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    width: 18px; height: 18px;
    stroke: var(--accent-1);
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    transition: transform 0.3s ease;
  }
  .custom-select:focus + .select-icon {
    transform: translateY(-50%) rotate(180deg);
  }

  /* ─── BUTTONS ─── */
  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    background-size: 200% auto;
    color: #fff;
    border: none;
    padding: 18px;
    border-radius: 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 10px 25px rgba(59,130,246,0.3);
    position: relative;
    overflow: hidden;
  }
  
  .btn-primary::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 50%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transform: skewX(-20deg);
    transition: 0.5s;
  }

  .btn-primary:hover {
    transform: translateY(-3px);
    background-position: right center;
    box-shadow: 0 15px 35px rgba(139,92,246,0.4);
  }
  
  .btn-primary:hover::after {
    left: 150%;
  }

  .btn-primary:active { transform: translateY(0); }

  /* Share Icon Animation */
  .btn-primary svg { 
    width: 20px; height: 20px; 
    fill: none; 
    stroke: currentColor; 
    stroke-width: 2; 
    stroke-linecap: round; 
    stroke-linejoin: round;
    transition: transform 0.3s ease;
  }
  .btn-primary:hover svg {
    transform: translate(3px, -3px) rotate(10deg);
  }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translate(-50%, 20px);
    background: rgba(6, 78, 59, 0.9);
    backdrop-filter: blur(10px);
    border: 1px solid #10b981;
    color: #a7f3d0;
    padding: 14px 28px;
    border-radius: 30px;
    font-weight: 500;
    font-size: 14px;
    z-index: 100;
    opacity: 0;
    visibility: hidden;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 10px 30px rgba(16, 185, 129, 0.2);
  }
  .toast.show {
    opacity: 1;
    visibility: visible;
    transform: translate(-50%, 0);
  }
  .toast svg {
    width: 18px; height: 18px;
    stroke: #10b981; stroke-width: 2; fill: none;
  }

  /* ─── FOOTER ─── */
  .footer {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: var(--text-muted);
    z-index: 5;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .footer svg {
    width: 14px; height: 14px;
    fill: var(--accent-1);
    animation: pulse-dot 2s infinite;
  }

</style>
</head>
<body>

<!-- TOAST NOTIFICATION -->
<div class="toast" id="toast">

<!-- NAVBAR -->
<nav class="navbar">

<!-- MAIN CONTENT -->
<div class="container">

  <!-- VIDEO PLAYER -->

  <!-- CHANNEL SELECTOR -->
  <div class="card">
    <div class="card-title">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>

  <!-- SHARE -->
  <div class="card">
    <div class="card-title">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
      Share Direct Link
    </div>
    <button class="btn-primary" id="shareBtn">
      <svg viewBox="0 0 24 24">
        <path d="M22 2L11 13"></path>
        <path d="M22 2l-7 20-4-9-9-4 20-7z"></path>
      </svg>
      Copy Channel Link
    </button>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    © 2025 GW TEAM · Built for Seamless Streaming 
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 21C16.9706 21 21 16.9706 21 12C21 7.02944 16.9706 3 12 3C7.02944 3 3 7.02944 3 12C3 16.9706 7.02944 21 12 21Z"/>
      <path d="M12 16.5C14.4853 16.5 16.5 14.4853 16.5 12C16.5 9.51472 14.4853 7.5 12 7.5C9.51472 7.5 7.5 9.51472 7.5 12C7.5 14.4853 9.51472 16.5 12 16.5Z" fill="var(--bg-color)"/>
    </svg>
  </div>

</div>

<script>
// ─── JSON DATA ───
const streamData = {
  "iframes": [
    { "id": "eng", "name": "Star Sports Select (Default)", "iframeSrc": "https://allrounder-live4.pages.dev/star/star-1" },
    { "id": "hindi", "name": "Star Sports Hindi", "iframeSrc": "https://allrounder-live4.pages.dev/star/star-1-hindi" },
    { "id": "cricbuzz", "name": "Cricbuzz", "iframeSrc": "https://allrounder-live4.pages.dev/channel/cricbuzz" },
    { "id": "wpl", "name": "Hotstar WPL", "iframeSrc": "https://allrounderlive.pages.dev/cric-life" },
    { "id": "asiacup", "name": "Asia Cup", "iframeSrc": "https://allrounderlive.pages.dev/player?url=https://d3ssd0juqbxbw.cloudfront.net/mtvsinstlive/master.m3u8" },
    { "id": "willow", "name": "Willow TV", "iframeSrc": "https://allrounder-live4.pages.dev/channel/willow" },
    { "id": "willow-2", "name": "Willow TV 2", "iframeSrc": "https://allrounderlive.pages.dev/willow2" },
    { "id": "willow-sports", "name": "Willow Sports", "iframeSrc": "https://cricketstan.github.io/Willow-Sports/" },
    { "id": "alt", "name": "GW TEAM (Alt Stream)", "iframeSrc": "https://allrounderlive.pages.dev/player?url=https://dillzy.cricketstream745.workers.dev/live.m3u8" },
    { "id": "fox", "name": "Fox Cricket 501", "iframeSrc": "https://allrounder-live2.pages.dev/channel/fox" },
    { "id": "fox-hd", "name": "Fox Cricket HD", "iframeSrc": "https://cricketstan.github.io/Fox-Cricket-/" },
    { "id": "channel-7", "name": "7 Plus Cricket", "iframeSrc": "https://allrounderlive.pages.dev/player?url=https://hugh.cdn.rumble.cloud/live/gi29le7p/slot-139/bx1o-9vac_720p/chunklist.m3u8" },
    { "id": "ios", "name": "Apple Wale / iOS", "iframeSrc": "https://allrounderlive.pages.dev/player4?url=https://amg01269-amg01269c1-sportstribal-emea-5204.playouts.now.amagi.tv/playlist/amg01269-willowtvfast-willowplus-sportstribalemea/playlist.m3u8" },
    { "id": "sky-uk", "name": "SKY UK", "iframeSrc": "https://allroundersd.pages.dev/channel/sky-uk" },
    { "id": "sky-nz-1", "name": "SKY NZ 1", "iframeSrc": "https://crickettv.site/sky-nz/player?id=3" },
    { "id": "sky-sports-nz", "name": "Sky NZ", "iframeSrc": "https://allrounder-live4.pages.dev/channel/prime.html" },
    { "id": "prime-hin", "name": "Prime Hindi", "iframeSrc": "https://allrounder-live.pages.dev/channel/prame-hin.html" },
    { "id": "prime-eng", "name": "Prime English", "iframeSrc": "https://allrounder-live4.pages.dev/channel/prame.html" },
    { "id": "prime-nz", "name": "PRIME NZ", "iframeSrc": "https://hff-cricketstan.wasmer.app/" },
    { "id": "tnt", "name": "TNT Sports", "iframeSrc": "https://allrounder-live2.pages.dev/channel/tnt-2" },
    { "id": "tnt-1", "name": "TNT Sports 1", "iframeSrc": "https://cricketstan.github.io/TNT-1/" },
    { "id": "sony", "name": "SONY Liv", "iframeSrc": "https://allrounderlive.pages.dev/sonyliv/sonyliv-1" },
    { "id": "sony-3", "name": "Sony Ten 5", "iframeSrc": "https://cricketstan.github.io/Sony-ten-5/" },
    { "id": "zee", "name": "Zee Cinema", "iframeSrc": "https://zee-seven.vercel.app/" },
    { "id": "hotstar", "name": "Hotstar (Main)", "iframeSrc": "https://allrounderlive.pages.dev/dilz?id=dillzy645" },
    { "id": "jio-hotstar", "name": "Jio Hotstar", "iframeSrc": "https://allrounder-live4.pages.dev/channel/hotstar" },
    { "id": "fancode", "name": "Fancode", "iframeSrc": "https://allrounder-live4.pages.dev/fancode-player?url=https://in-mc-flive.fancode.com/mumbai/141407_english_hls_ab5ff6c24a21542_1ta-di_h264/1080p.m3u8?hdntl=Expires=1773474245~_GO=Generated~acl=/mumbai/141407_english_hls_ab5ff6c24a21542_1ta-di_h264/*~Signature=AR77L-Yyr9Cdj5X_0so3HpmxTUDWXrASgqUxhTGBOrJaU6SPgB5oUrj5FOVZ7FqeaDZnyCZIHYhGDYKbrr-wcsI214oJ" },
    { "id": "ptv", "name": "PTV Sports", "iframeSrc": "https://allrounder-live2.pages.dev/channel/ptv" },
    { "id": "myco", "name": "Myco", "iframeSrc": "https://allrounder-rho.vercel.app/channel/myco.html" },
    { "id": "hub", "name": "Hub", "iframeSrc": "https://allrounder-live.pages.dev/channel/hub5" },
    { "id": "telugu", "name": "Star Telugu", "iframeSrc": "https://allrounder-live4.pages.dev/star/telugu" },
    { "id": "tamil", "name": "Star Tamil", "iframeSrc": "https://allrounder-live4.pages.dev/star/tamil-1" }
  ]
};

document.addEventListener("DOMContentLoaded", function () {
  const select = document.getElementById("channelSelect");
  const playerContainer = document.getElementById("player-container");
  const channelNameLabel = document.getElementById("currentChannelName");
  
  // Read URL parameters
  const urlParams = new URLSearchParams(window.location.search);
  let currentId = urlParams.get("id");

  // Populate Dropdown Menu
  streamData.iframes.forEach(item => {
    let option = document.createElement("option");
    option.value = item.id;
    option.text = item.name;
    select.appendChild(option);
  });

  // Load Iframe Function
  function loadStream(id) {
    const match = streamData.iframes.find(item => item.id === id);
    if (match && match.iframeSrc) {
      // Small delay added to allow CSS loading spinner to show briefly
      playerContainer.innerHTML = '';
      setTimeout(() => {
        playerContainer.innerHTML = `<iframe src="${match.iframeSrc}" allow="encrypted-media; autoplay" allowfullscreen></iframe>`;
      }, 300);
      
      channelNameLabel.innerText = match.name;
      
      // Update URL silently
      window.history.replaceState(null, null, "?id=" + id);
      select.value = id;
    }
  }

  // Detect Dropdown Change
  select.addEventListener("change", function(e) {
    loadStream(e.target.value);
  });

  // ─── DEFAULT LOGIC ───
  if (!currentId || !streamData.iframes.find(i => i.id === currentId)) {
    currentId = 'eng'; 
  }
  loadStream(currentId);

  // ─── SHARE BUTTON ───
  const toast = document.getElementById("toast");
  document.getElementById("shareBtn").onclick = function () {
    navigator.clipboard.writeText(window.location.href).then(() => {
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 3000);
    });
  };

});
