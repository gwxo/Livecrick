<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DILLZY — Live Stream Player</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c23;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --glow: rgba(59,130,246,0.35);
    --red: #ef4444;
    --text: #f0f4ff;
    --muted: #6b7280;
    --border: rgba(255,255,255,0.07);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 60px;
    overflow-x: hidden;
  }

  /* ─── BG GRID ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(59,130,246,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── NAV BAR ─── */
  .navbar {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 520px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 20px 0;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #fff 30%, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    position: relative;
  }
  .logo::after {
    content: 'LIVE';
    position: absolute;
    top: -4px;
    right: -36px;
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    background: var(--red);
    -webkit-text-fill-color: #fff;
    color: #fff;
    padding: 2px 5px;
    border-radius: 4px;
    animation: pulse-badge 1.5s infinite;
  }
  
  @keyframes pulse-badge {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .nav-dot {
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--red);
    animation: pulse-badge 1.5s infinite;
  }

  /* ─── MAIN CONTAINER ─── */
  .container {
    position: relative;
    z-index: 5;
    width: 100%;
    max-width: 520px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ─── PLAYER ─── */
  .player-wrap {
    position: relative;
    width: 100%;
    padding-top: 56.25%;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
    box-shadow:
      0 0 0 1px var(--border),
      0 0 40px var(--glow),
      0 24px 48px rgba(0,0,0,0.6);
  }
  .player-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 2;
    border-radius: 16px;
    box-shadow: inset 0 0 0 1.5px rgba(59,130,246,0.3);
    pointer-events: none;
  }
  .player-wrap iframe,
  .player-wrap #player-container {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    z-index: 1;
  }

  .player-label {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 3;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--accent2);
    text-transform: uppercase;
  }
  .player-label span {
    width: 6px; height: 6px;
    background: var(--red);
    border-radius: 50%;
    animation: pulse-badge 1.5s infinite;
  }

  /* ─── DIVIDER ─── */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ─── CARDS ─── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    backdrop-filter: blur(8px);
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 14px;
  }

  /* ─── DROPDOWN SELECTOR ─── */
  .custom-select {
    width: 100%;
    padding: 14px 16px;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    outline: none;
    cursor: pointer;
    appearance: none;
    background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2360a5fa%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
    background-repeat: no-repeat;
    background-position: right 16px top 50%;
    background-size: 12px auto;
    transition: all 0.2s ease;
  }
  .custom-select:hover, .custom-select:focus {
    border-color: rgba(59,130,246,0.5);
    box-shadow: 0 0 15px rgba(59,130,246,0.2);
  }
  .custom-select option {
    background: var(--surface2);
    color: var(--text);
  }

  /* ─── SHARE BTN ─── */
  .share-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: linear-gradient(135deg, var(--accent), #1d4ed8);
    border: none;
    border-radius: 14px;
    padding: 15px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 4px 20px rgba(59,130,246,0.35);
  }
  .share-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(59,130,246,0.5);
  }
  .share-btn svg { width: 18px; height: 18px; fill: #fff; }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1a2a1a;
    border: 1px solid #22c55e;
    color: #86efac;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 600;
    z-index: 200;
    opacity: 0;
    transition: all 0.3s ease;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .footer { text-align: center; font-size: 12px; color: var(--muted); margin-top: 8px; z-index: 5; position: relative;}
</style>
</head>
<body>

<!-- TOAST NOTIFICATION -->
<div class="toast" id="toast">✓ Link copied to clipboard</div>

<!-- NAV -->
<nav class="navbar">
  <div class="logo">DILLZY</div>
  <div class="nav-dot"></div>
</nav>

<!-- MAIN -->
<div class="container">

  <!-- PLAYER -->
  <div class="player-wrap">
    <div class="player-label"><span></span> <b id="currentChannelName">Live Stream</b></div>
    <div id="player-container"></div>
  </div>

  <!-- DROPDOWN CARD -->
  <div class="card">
    <div class="card-title">Select Channel</div>
    <select id="channelSelect" class="custom-select"></select>
  </div>

  <div class="divider">Share</div>

  <!-- SHARE CARD -->
  <div class="card">
    <div class="card-title">Share This Stream</div>
    <button class="share-btn" id="shareBtn">
      <svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      Copy Stream Link
    </button>
  </div>

</div>

<div class="footer">© 2025 DILLZY · All rights reserved</div>

<script>

    { "id": "fox-hd", "name": "Fox Cricket HD", "iframeSrc": "https://cricketstan.github.io/Fox-Cricket-/" },
    { "id": "channel-7", "name": "7 Plus Cricket", "iframeSrc": "https://allrounderlive.pages.dev/player?url=https://hugh.cdn.rumble.cloud/live/gi29le7p/slot-139/bx1o-9vac_720p/chunklist.m3u8" },
    { "id": "ios", "name": "Apple Wale / iOS", "iframeSrc": "https://allrounderlive.pages.dev/player4?url=https://amg01269-amg01269c1-sportstribal-emea-5204.playouts.now.amagi.tv/playlist/amg01269-willowtvfast-willowplus-sportstribalemea/playlist.m3u8" },

    { "id": "sky-nz-1", "name": "SKY NZ 1", "iframeSrc": "https://crickettv.site/sky-nz/player?id=3" },

    { "id": "prime-hin", "name": "Prime Hindi", "iframeSrc": "https://allrounder-live.pages.dev/channel/prame-hin.html" },
    { "id": "prime-eng", "name": "Prime English", "iframeSrc": "https://allrounder-live4.pages.dev/channel/prame.html" },
    { "id": "prime-nz", "name": "PRIME NZ", "iframeSrc": "https://hff-cricketstan.wasmer.app/" },

    { "id": "tnt-1", "name": "TNT Sports 1", "iframeSrc": "https://cricketstan.github.io/TNT-1/" },

    { "id": "hotstar", "name": "Hotstar (Main)", "iframeSrc": "https://allrounderlive.pages.dev/dilz?id=dillzy645" },
    { "id": "jio-hotstar", "name": "Jio Hotstar", "iframeSrc": "https://allrounder-live4.pages.dev/channel/hotstar" },
    { "id": "fancode", "name": "Fancode", "iframeSrc": "https://allrounder-live4.pages.dev/fancode-player?url=https://in-mc-flive.fancode.com/mumbai/141407_english_hls_ab5ff6c24a21542_1ta-di_h264/1080p.m3u8?hdntl=Expires=1773474245~_GO=Generated~acl=/mumbai/141407_english_hls_ab5ff6c24a21542_1ta-di_h264/*~Signature=AR77L-Yyr9Cdj5X_0so3HpmxTUDWXrASgqUxhTGBOrJaU6SPgB5oUrj5FOVZ7FqeaDZnyCZIHYhGDYKbrr-wcsI214oJ" },
    { "id": "ptv", "name": "PTV Sports", "iframeSrc": "https://allrounder-live2.pages.dev/channel/ptv" },
    { "id": "myco", "name": "Myco", "iframeSrc": "https://allrounder-rho.vercel.app/channel/myco.html" },
    { "id": "hub", "name": "Hub", "iframeSrc": "https://allrounder-live.pages.dev/channel/hub5" },
    { "id": "telugu", "name": "Star Telugu", "iframeSrc": "https://allrounder-live4.pages.dev/star/telugu" },
    { "id": "tamil", "name": "Star Tamil", "iframeSrc": "https://allrounder-live4.pages.dev/star/tamil-1" }
  ]
};

document.addEventListener("DOMContentLoaded", function () {
  const select = document.getElementById("channelSelect");
  const playerContainer = document.getElementById("player-container");
  const channelNameLabel = document.getElementById("currentChannelName");
  
  // Check if URL has ?id= parameter
  const urlParams = new URLSearchParams(window.location.search);
  let currentId = urlParams.get("id");

  // Populate Dropdown Menu
  streamData.iframes.forEach(item => {
    let option = document.createElement("option");
    option.value = item.id;
    option.text = item.name;
    select.appendChild(option);
  });

  // Function to load iframe
  function loadStream(id) {
    const match = streamData.iframes.find(item => item.id === id);
    if (match && match.iframeSrc) {
      playerContainer.innerHTML = `<iframe src="${match.iframeSrc}" allow="encrypted-media; autoplay" allowfullscreen></iframe>`;
      channelNameLabel.innerText = match.name;
      
      // Update browser URL without reloading page (makes the Share link accurate)
      window.history.replaceState(null, null, "?id=" + id);
      select.value = id;
    }
  }

  // Handle Dropdown Change
  select.addEventListener("change", function(e) {
    loadStream(e.target.value);
  });

  // Initial Load (Defaults to the first channel in the list if no ?id is provided)
  if (!currentId || !streamData.iframes.find(i => i.id === currentId)) {
    currentId = streamData.iframes[0].id;
  }
  loadStream(currentId);

  // ─── SHARE BTN LOGIC ───
  const toast = document.getElementById("toast");
  document.getElementById("shareBtn").onclick = function () {
    navigator.clipboard.writeText(window.location.href).then(() => {
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2500);
    });
  };

});
</script>

</body>
</html>
